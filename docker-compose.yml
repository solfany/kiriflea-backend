version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nplohs-postgres
    environment:
      POSTGRES_DB: nplohs_market
      POSTGRES_USER: nplohs
      POSTGRES_PASSWORD: nplohs1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nplohs-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: nplohs-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
